<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Elegance Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ELEGANCE</a>
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menú</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="section">
        <div class="container">
            <div class="text-center mb-5">
                <h1 class="mb-3">Contáctanos</h1>
                <p class="text-secondary">Reserva una mesa o envíanos cualquier consulta.</p>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card-custom">
                        <form>
                            <div class="mb-4">
                                <label class="form-label">Nombre</label>
                                <input
                                    type="text"
                                    class="form-control custom-input"
                                    placeholder="Ingrese su nombre">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Correo Electrónico</label>
                                <input
                                    type="email"
                                    class="form-control custom-input"
                                    placeholder="Ingrese su correo">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Mensaje</label>
                                <textarea
                                    rows="5"
                                    class="form-control custom-input"
                                    placeholder="Escriba su mensaje"></textarea>
                            </div>
                            <button type="submit" class="btn btn-custom w-100">ENVIAR MENSAJE</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section class="pb-5">
        <div class="container">
            <div class="row text-center g-4">
                <div class="col-md-4">
                    <div class="card-custom">
                        <h4>Dirección</h4>
                        <p>Av. Principal 123<br>
                            La Paz, Bolivia</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card-custom">
                        <h4>Horarios</h4>
                        <p>Lunes a Domingo<br>
                            12:00 PM - 11:00 PM</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card-custom">
                        <h4>Reservas</h4>
                        <p>+591 74564841<br>
                            reservas@blablab.com
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <p>Elegance Restaurant © 2026</p>
    </footer>
</body>
</html>
